name: Deploiement EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Vérifier le build Docker
        run: |
          docker build -t saonelocal-test .

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Connexion au serveur EC2 et Déploiement
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Nettoyer et cloner le dépôt
            rm -rf SaoneLocal
            git clone https://github.com/angelinacarvelli/SaoneLocal.git
            cd SaoneLocal

            # 1. Supprimer l'ancien conteneur s'il existe
            sudo docker stop saonelocal || true
            sudo docker rm saonelocal || true

            # 2. Build de la nouvelle image
            sudo docker build --no-cache -t saonelocal .
            
            # 3. Lancement sur le port 80
            sudo docker run -d --name saonelocal -p 80:80 --restart always saonelocal
            
            echo "VÉRIFICATION DU DÉPLOIEMENT"
            sudo docker ps -a
            sudo docker logs saonelocal