name: Deploiement EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 1. On vérifie d'abord que le projet compile bien
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Vérifier le build Docker
        run: |
          docker build -t test-build .

  # 2. Si le build est OK, on déploie sur ton EC2
  deploy:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Connexion au serveur EC2 et Déploiement
        uses: appleboy/ssh-action@master #appleboy/ssh-action@master : outil préfabriqué qui permet à GitHub de se connecter au serveur AWS EC2 à distance, master = prendre la version la plus récente de la branche du code
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user # peut etre changer a expliquer a selene comment le faire precisément
          key: ${{ secrets.EC2_SSH_KEY }}
          script: | #run s'exécute sur les serveurs de GitHub, alors que script s'exécute à distance sur ton propre serveur AWS.
            # Installer Git si manquant
            if ! command -v git &> /dev/null; then
              sudo dnf install git -y || sudo apt-get install git -y
            fi

            # Nettoyer et cloner le dépôt
            rm -rf SaoneLocal
            git clone https://github.com/angelinacarvelli/SaoneLocal.git
            cd SaoneLocal

            # Arrêter l'ancien conteneur s'il existe
            sudo docker stop SaoneLocal || true
            sudo docker rm SaoneLocal || true

            # Build de la nouvelle image
            sudo docker build -t saonelocal .

            # Lancement sur le port 8080 (Nginx se chargera du HTTPS)
            sudo docker run -d --name saonelocal -p 8080:80 --restart always saonelocal