name: CI docker deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # On s'assure que Docker tourne
            sudo systemctl start docker
            
            # Aller dans le dossier du projet (à adapter selon votre dossier)
            cd ~/mon-projet || git clone [https://github.com/angie/saone-project.git] ~/mon-projet
            cd ~/mon-projet
            git pull origin main

            # Build et Relance du conteneur sur le port 8080
            docker build -t mon-app .
            docker stop mon-app || true
            docker rm mon-app || true
            docker run -d --name mon-app -p 8080:80 mon-app