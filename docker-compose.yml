services:
  saonelocal:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./realfrontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - saonelocal

  postgres:
    image: postgres:16
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/shema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: