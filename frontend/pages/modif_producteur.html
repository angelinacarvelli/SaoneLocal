<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon compte client</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "saone-green": '#2B5148',
                        "saone-terracotta": '#A53F32',
                        "saone-cream": '#F9F6EF',
                    },
                    fontFamily: {
                        caveat: ['Caveat Brush', 'cursive'],
                        montserrat: ['Montserrat', 'sans-serif']
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-saone-cream font-montserrat">
    <div class="max-w-[375px] mx-auto px-4 pb-24">

        <h1 class="pt-[60px] text-center font-caveat text-[20px] text-saone-terracotta uppercase">Modifier mon profil</h1>

        <div class="mt-[22px] text-center">

            <label for="photo" class="text-[10px] font-semibold text-saone-green cursor-pointer relative inline-block">
                <img src="../image/saonelocal-isabelle-producteur.jpg" class="w-[70px] h-[70px] rounded-full object-cover">
                <p class="absolute top-0 right-0 mt-6 mr-6 bg-saone-terracotta text-white rounded-full w-5 h-5 pt-0.5">+</p>
            </label>

            <input type="file" accept="image/*" class="hidden" onchange="changePhoto(event)">

            <p class="text-[11px] text-saone-green mt-2">Changer la photo</p>
        </div>

        <form class="mt-[18px] space-y-3">
            <div>
                <label class="font-caveat text-[15px] text-saone-green">Nom</label>
                <input name="nom" value="FONTAINE-MARCHAIS" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
            </div>

            <div>
                <label class="font-caveat text-[15px] text-saone-green">Prénom</label>
                <input name="prenom" value="Isabelle" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
            </div>

            <div>
                <label class="font-caveat text-[15px] text-saone-green">Adresse</label>
                <input name="adresse" value="12 rue Saint-Laurent" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
            </div>

            <div>
                <label class="font-caveat text-[15px] text-saone-green">Ville</label>
                <input name="ville" value="Mercurey" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
            </div>

            <div>
                <label class="font-caveat text-[15px] text-saone-green">Téléphone</label>
                <input name="telephone" value="07 65 42 13 76" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
            </div>

            <div>
                <label class="font-caveat text-[15px] text-saone-green">E-mail</label>
                <input name="email" value="isabelle.fontaine@gmail.com" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
            </div>

            <div>
                <label class="font-caveat text-[15px] text-saone-green">Catégorie</label>
                <select name="categorie" class="w-full bg-saone-green text-saone-cream rounded-[10px] h-[35px] px-3 text-[12px]">
                    <option>Vin / Vigneronne</option>
                    <option>Maraîcher</option>
                    <option>Boulangerie</option>
                    <option>Fromagerie</option>
                </select>
            </div>

            <div class="flex flex-col items-center gap-3 mt-[35px]">
                <button type="submit" class="bg-saone-terracotta text-saone-cream rounded-full px-6 py-2 text-[11px] shadow-custom">Enregistrer les modifications</button>
                <button type="button" class="bg-saone-terracotta text-saone-cream rounded-full px-8 py-2 text-[11px] shadow-custom">Supprimer le compte</button>
            </div>
        </form>
    </div>

    <script>
        function changePhoto(event){
            const image = document.getElementById("preview");
            image.src = URL.createObjectURL(event.target.files[0]);
        }
    </script>
</body>
</html>
