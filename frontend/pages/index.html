<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaôneLocal - Accueil</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'saone-green': '#2B5148',
                        'saone-terracotta': '#A53F32',
                        'saone-cream': '#F9F6EF',
                    },
                    fontFamily: {
                        'title': ['Caveat Brush', 'cursive'],
                        'body': ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Montserrat:wght@400;500;600;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #F9F6EF; }
        .font-title { font-family: 'Caveat Brush', cursive; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="w-[375px] mx-auto min-h-screen flex flex-col items-center p-4">

    <header class="w-full pt-[60px] pb-[42px]">
        <html-include src="../components/header.jsx"></html-include>
    </header>

    <main class="w-full flex-1 space-y-[22px] pb-[120px]">
        <!-- <saone-card 
            title="Plus sur nous" 
            description="Notre association est une association de proximité, nous créons du lien avec nos clients. Ce ne sont pas de simples produits mais la Bourgogne entière que vous mettez en bouche." 
            btn-text="Nous connaître">
        </saone-card> -->
        <script>
            import Card from "./components/Card";
                export default function App() {
                return (
                    <main>
                    <h1>Ma page</h1>

                    <Card
                        title="Plus sur nous"
                        description="Notre association est une association de proximité..."
                        btntext="Nous connaître"
                    />

                    <p>Du contenu après la carte</p>
                    </main>
                );
                }  
        </script>

        <saone-card 
            title="Nos producteurs locaux" 
            description="Nos produits sont si savoureux parce qu'ils sont faits avec l'amour de nos producteurs. Nos producteurs s'impliquent dans leur travail." 
            btn-text="Voir l'équipe">
        </saone-card>

        <saone-card 
            title="Se laisser tenter" 
            description="Il faut mettre en bouche ces délices pour ressentir la Bourgogne et tout ce savoir-faire." 
            btn-text="Goûter" 
            has-images>
        </saone-card>

    </main>

    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[375px] px-4 pb-4 bg-gradient-to-t from-saone-cream via-saone-cream/95 to-transparent pt-6 flex flex-col items-center gap-3 z-50">
        <html-include src="../components/navbar.jsx" class="w-full"></html-include>
        <div class="w-full">
            <html-include src="../components/footer.jsx"></html-include>
        </div>
    </div>

    <script src="../js/layout-engine.js"></script>
</body>
</html>
