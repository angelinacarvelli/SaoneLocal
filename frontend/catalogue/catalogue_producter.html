<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - SaôneLocal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <nav class="navbar" style="display: flex; justify-content: space-between; padding: 15px; background: #f8f9fa;">
            <div>
    <div>
        <a href="page.accueil/index.html" style="margin-left: 15px;">Retour</a> 
        <a href="page.accueil/index.html" style="margin-left: 15px;"> Accueil</a> 
    </div>            
    <div>
                <span> Rechercher</span> <span> Mon Panier</span> </div>
        </nav>
    </header>

    <main style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        <h1 style="text-align: center;">Nos Producteurs Locaux</h1> <section id="catalogue-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
            <p>Chargement des producteurs...</p>
        </section>
    </main>

    <footer style="margin-top: 50px; text-align: center; padding: 20px; border-top: 1px solid #ddd;">
        <p>© 2026 Association SaôneLocal - Tous droits réservés.</p>
    </footer>

    <script>
        fetch('/api/producer/all')
            .then(response => response.json())
            .then(producers => {
                const grid = document.getElementById('catalogue-grid');
                grid.innerHTML = ""; // On efface le texte "Chargement..."

                // Pour chaque producteur reçu, on crée une carte HTML
                producers.forEach(p => {
                    const card = `
                        <div style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; background: white;">
                            <img src="${p.producer_image || '//image'}" alt="Photo" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px;">
                            <h3>${p.compagnyname}</h3>
                            <p style="color: #7f8c8d;"> Artisan : ${p.firstname} ${p.lastname}</p>
                            
                            <a href="/producers?id=${p.producer_id}" style="display: inline-block; background: #2ecc71; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; margin-top: 10px;">
                                Voir le profil
                            </a>
                        </div>
                    `;
                    grid.innerHTML += card; // On ajoute la carte dans la grille
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('catalogue-grid').innerHTML = "Erreur de chargement des producteurs.";
            });
    </script>
</body>
</html>
