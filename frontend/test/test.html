<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Espace Producteur - SaoneLocal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; color: #333; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #fafafa; }
        h2 { margin-top: 0; color: #34495e; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .btn-status { background: #e67e22; }
        .btn-status:hover { background: #d35400; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 4px; overflow-x: auto; max-height: 150px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Test - Profil Producteur</h1>
    <p>Connecté en tant que : <strong>Producteur de test</strong></p>

    <div class="section">
        <h2>Modifier le Profil</h2>
        <label>Nom de l'entreprise (compagnyName)</label>
        <input type="text" id="compagnyName" value="karime entreprise">
        <label>Présentation</label>
        <textarea id="presentation" rows="2">Boulanger artisanal local</textarea>
        <button onclick="updateProfil()">Mettre à jour le profil</button>
    </div>

    <div class="section">
        <h2>Stats Mensuelles</h2>
        <button onclick="getStats()">Charger le Chiffre d'Affaires & Commandes</button>
    </div>
      <div class="section">
        <h2>Ajouter un Produit au Catalogue</h2>
        <label>Nom du produit</label>
        <input type="text" id="prod-name" placeholder="Nom du produit">
        <label>Description</label>
        <textarea id="prod-description" placeholder="Description du produit"></textarea>
        <label>Prix</label>
        <input type="number" id="prod-price" placeholder="Prix du produit" step="0.01">
        <label>Image</label>
        <input type="text" id="prod-image" placeholder="URL de l'image">
        <label>Category</label>
        <select id="prod-category">
            <option value="">Sélectionnez une catégorie</option>
            <option value="1">Boulangerie</option>
            <option value="2">Fromagerie</option>
        </select>
        <button onclick="addProduct()">Ajouter le produit</button>
        </div>

    <div class="section">
        <h2>Ajouter un événement</h2>
        <label>Nom de l'événement</label>
        <input type="text" id="event-name" placeholder="Nom de l'événement">
        <label>Date</label>
        <input type="date" id="event-date">
        <label>Description</label>
        <textarea id="event-description" placeholder="Description de l'événement"></textarea>
        <label>Location</label>
        <input type="text" id="event-location" placeholder="Lieu de l'événement">
        <button onclick="addEvent()">Ajouter l'événement</button>
    </div>
        <input type="number" id="prod-price" placeholder="Prix du produit" step="0.01">
        <label>Image</label>
        <input type="text" id="prod-image" placeholder="URL de l'image">
        </select>
        <button onclick="addProduct()">Ajouter le produit</button>
    </div>
